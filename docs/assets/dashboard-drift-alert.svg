<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Drift alert dashboard preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="40" y="36" width="1120" height="66" rx="10" fill="#111827" stroke="#374151"/>
  <text x="70" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#f9fafb">mlops-sentinel dashboard (drift alert state)</text>

  <rect x="40" y="126" width="1120" height="76" rx="12" fill="#7f1d1d" stroke="#ef4444"/>
  <text x="70" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#fee2e2">Warning: Confidence drift detected for risk-model-v1</text>

  <rect x="40" y="226" width="360" height="180" rx="12" fill="#111827" stroke="#374151"/>
  <text x="66" y="266" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#93c5fd">Average confidence</text>
  <text x="66" y="336" font-family="Segoe UI, Arial, sans-serif" font-size="52" fill="#f9fafb">0.47</text>

  <rect x="420" y="226" width="360" height="180" rx="12" fill="#111827" stroke="#374151"/>
  <text x="446" y="266" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#93c5fd">P95 latency (ms)</text>
  <text x="446" y="336" font-family="Segoe UI, Arial, sans-serif" font-size="52" fill="#f9fafb">1280</text>

  <rect x="800" y="226" width="360" height="180" rx="12" fill="#111827" stroke="#374151"/>
  <text x="826" y="266" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#93c5fd">Drift flag</text>
  <text x="826" y="336" font-family="Segoe UI, Arial, sans-serif" font-size="52" fill="#fca5a5">ACTIVE</text>

  <rect x="40" y="430" width="1120" height="244" rx="12" fill="#111827" stroke="#374151"/>
  <text x="66" y="470" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#93c5fd">Latency trend and confidence degradation</text>
  <polyline fill="none" stroke="#f59e0b" stroke-width="4" points="80,630 190,580 300,600 410,540 520,560 630,500 740,520 850,470 960,500 1070,440"/>
  <polyline fill="none" stroke="#60a5fa" stroke-width="4" points="80,600 190,580 300,565 410,548 520,536 630,520 740,504 850,488 960,474 1070,462"/>
</svg>
