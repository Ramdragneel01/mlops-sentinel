# Generated by GitHub Copilot
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: mlops-sentinel/backend:latest
    restart: unless-stopped
    environment:
      - MLOPS_DB_PATH=/app/data/sentinel.db
      - MLOPS_CORS_ORIGINS=${MLOPS_CORS_ORIGINS:-http://localhost:8080}
      - MLOPS_ALLOWED_HOSTS=${MLOPS_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      - MLOPS_SUMMARY_SIZE=${MLOPS_SUMMARY_SIZE:-100}
      - MLOPS_DRIFT_THRESHOLD=${MLOPS_DRIFT_THRESHOLD:-0.55}
      - MLOPS_RATE_LIMIT_PER_MINUTE=${MLOPS_RATE_LIMIT_PER_MINUTE:-600}
      - MLOPS_MAX_PAYLOAD_BYTES=${MLOPS_MAX_PAYLOAD_BYTES:-65536}
      - MLOPS_GZIP_MINIMUM_SIZE=${MLOPS_GZIP_MINIMUM_SIZE:-1024}
      - MLOPS_ENABLE_HSTS=${MLOPS_ENABLE_HSTS:-false}
      - MLOPS_API_KEY_FILE=/run/secrets/mlops_api_key
    secrets:
      - mlops_api_key
    volumes:
      - mlops_sentinel_data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: mlops-sentinel/frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mlops_sentinel_data:
  prometheus_data:

secrets:
  mlops_api_key:
    file: ${MLOPS_API_KEY_SECRET_FILE:-./secrets/mlops_api_key.txt}