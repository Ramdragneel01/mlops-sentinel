# Generated by GitHub Copilot
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: mlops-sentinel-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend compile check
        working-directory: backend
        run: python -m compileall -q app tests

      - name: Backend dependency consistency
        working-directory: backend
        run: python -m pip check

      - name: Run backend tests
        working-directory: backend
        run: pytest -q --maxfail=1

      - name: Backend dependency audit
        working-directory: backend
        run: |
          python -m pip install --upgrade pip-audit
          pip-audit -r requirements.txt --progress-spinner off

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (backend)
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mlops-sentinel-backend
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
            type=semver,pattern={{major}},value=${{ github.ref_name }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}

      - name: Docker metadata (frontend)
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mlops-sentinel-frontend
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
            type=semver,pattern={{major}},value=${{ github.ref_name }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          build-args: |
            VITE_API_URL=/api
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}

      - name: Package image tags
        run: |
          {
            echo "Backend tags:";
            echo "${{ steps.backend_meta.outputs.tags }}";
            echo;
            echo "Frontend tags:";
            echo "${{ steps.frontend_meta.outputs.tags }}";
          } > mlops-sentinel-image-tags-${{ github.ref_name }}.txt

      - name: Package frontend artifact
        run: tar -czf mlops-sentinel-frontend-dist-${{ github.ref_name }}.tgz -C
          frontend dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mlops-sentinel-frontend-dist-${{ github.ref_name }}.tgz
            mlops-sentinel-image-tags-${{ github.ref_name }}.txt
