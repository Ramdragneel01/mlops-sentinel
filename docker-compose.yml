
# Generated by GitHub Copilot
services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - MLOPS_DB_PATH=/app/data/sentinel.db
      - MLOPS_CORS_ORIGINS=http://127.0.0.1:4173,http://localhost:4173
      - MLOPS_ALLOWED_HOSTS=*
      - MLOPS_SUMMARY_SIZE=100
      - MLOPS_DRIFT_THRESHOLD=0.55
      - MLOPS_RATE_LIMIT_PER_MINUTE=600
      - MLOPS_MAX_PAYLOAD_BYTES=65536
      - MLOPS_GZIP_MINIMUM_SIZE=1024
      - MLOPS_ENABLE_HSTS=false
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://127.0.0.1:8000
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 4173"
    ports:
      - "4173:4173"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend
